apiVersion: v1
kind: Namespace
metadata:
  name: suitpro-epos
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: suitpro-config
  namespace: suitpro-epos
data:
  POSTGRES_HOST: "postgres-service"
  POSTGRES_DB: "suitpro_epos"
  POSTGRES_PORT: "5432"
  GOOGLE_SHEET_ID: "1SUITPRO_SAVIL_ROW_LEDGER_SHEETS_ID"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-deployment
  namespace: suitpro-epos
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
      - name: postgres
        image: postgres:15-alpine
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_DB
          value: "suitpro_epos"
        - name: POSTGRES_USER
          value: "postgres"
        - name: POSTGRES_PASSWORD
          value: "admin_secure_password"
        volumeMounts:
        - name: postgres-storage
          mountPath: /var/lib/postgresql/data
      volumes:
      - name: postgres-storage
        persistentVolumeClaim:
          claimName: postgres-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: suitpro-epos
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-service
  namespace: suitpro-epos
spec:
  ports:
  - port: 5432
  selector:
    app: postgres
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: epos-app-deployment
  namespace: suitpro-epos
spec:
  replicas: 2
  selector:
    matchLabels:
      app: epos-app
  template:
    metadata:
      labels:
        app: epos-app
    spec:
      containers:
      - name: epos-app
        image: gcr.io/suitpro-production/epos-app:v1.03
        ports:
        - containerPort: 3000
        envFrom:
        - configMapRef:
            name: suitpro-config
        env:
        - name: POSTGRES_USER
          value: "postgres"
        - name: POSTGRES_PASSWORD
          value: "admin_secure_password"
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "200m"
            memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: epos-app-service
  namespace: suitpro-epos
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 3000
  selector:
    app: epos-app
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sync-worker-deployment
  namespace: suitpro-epos
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sync-worker
  template:
    metadata:
      labels:
        app: sync-worker
    spec:
      containers:
      - name: sync-worker
        image: gcr.io/suitpro-production/epos-app:v1.03
        command: ["python3", "sync_sheets.py"]
        envFrom:
        - configMapRef:
            name: suitpro-config
        env:
        - name: POSTGRES_USER
          value: "postgres"
        - name: POSTGRES_PASSWORD
          value: "admin_secure_password"
